<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colégio Estadual São Cristóvão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <div class="logo">CE São Cristóvão</div>
        <nav>
            <ul class="nav-menu">
                <li><a href="#inicio">Início</a></li>
                <li><a href="#ensino">Ensino</a></li>
                <li><a href="#galeria">Galeria</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <section id="inicio" class="hero">
        <h1>Colégio Estadual São Cristóvão</h1>
        <p>Educação pública de qualidade e compromisso com o futuro.</p>
        <a href="#contato" class="btn">Fale Conosco</a>
    </section>

    <section id="galeria" class="container">
        <h2 class="section-title">Nossa Estrutura</h2>
        <div class="galeria-grid">
            <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?w=500" alt="Sala de aula" class="zoom-img">
            <img src="https://images.unsplash.com/photo-1541339907198-e08756ebafe3?w=500" alt="Biblioteca" class="zoom-img">
            <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=500" alt="Laboratório" class="zoom-img">
        </div>
    </section>

    <section id="contato" class="contato-container">
        <h2>Secretaria Virtual</h2>
        <form id="form-contato">
            <input type="text" id="nome" placeholder="Seu Nome Completo" required>
            <input type="email" id="email" placeholder="Seu E-mail" required>
            <textarea id="mensagem" placeholder="Como podemos ajudar?" rows="4"></textarea>
            <button type="submit" class="btn-enviar">Enviar Mensagem</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Colégio Estadual São Cristóvão | Secretaria da Educação</p>
    </footer>

    <div id="modal" class="modal">
        <span class="fechar">&times;</span>
        <img class="modal-conteudo" id="img-modal">
    </div>

    <script src="script.js"></script>
</body>
</html>
